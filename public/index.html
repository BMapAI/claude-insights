<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Ledger — ROI</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1d212b;
    --border: #272c38;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #d97757;
    --accent-2: #6ea8fe;
    --good: #5dd6a0;
    --warn: #e5683f;
    --opus: #d97757;
    --sonnet: #6ea8fe;
    --haiku: #c6a15b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
  }
  a { color: var(--accent-2); cursor: pointer; }

  #sidebar {
    width: 320px; min-width: 320px; height: 100vh; overflow-y: auto;
    background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .brand { padding: 18px 18px 12px; border-bottom: 1px solid var(--border); }
  .brand h1 { font-size: 16px; margin: 0; letter-spacing: .2px; }
  .brand .sub { color: var(--muted); font-size: 12px; margin-top: 4px; word-break: break-all; }
  .proj-list { padding: 8px; }
  .proj { padding: 11px 12px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; margin-bottom: 4px; }
  .proj:hover { background: var(--panel-2); }
  .proj.active { background: var(--panel-2); border-color: var(--accent); }
  .proj.all { border-color: var(--border); background: var(--panel-2); margin-bottom: 10px; }
  .proj.all.active { border-color: var(--accent); }
  .proj .name { font-weight: 600; display: flex; justify-content: space-between; gap: 8px; }
  .proj .name .cost { color: var(--accent); font-variant-numeric: tabular-nums; }
  .proj .meta { color: var(--muted); font-size: 12px; margin-top: 3px; display: flex; justify-content: space-between; }

  #main { flex: 1; height: 100vh; overflow-y: auto; }
  .inner { padding: 0 32px 32px; }

  /* Filter bar */
  #filterbar {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 14px 32px; background: rgba(15,17,21,.85); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .fb-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
  .presets { display: flex; gap: 6px; }
  .presets button {
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 11px; font-size: 13px; cursor: pointer;
  }
  .presets button:hover { color: var(--text); }
  .presets button.active { background: var(--accent); color: #1a1109; border-color: var(--accent); font-weight: 600; }
  .dateinput {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 9px; font-size: 13px; color-scheme: dark;
  }
  .fb-dash { color: var(--muted); }

  .empty { color: var(--muted); display: grid; place-items: center; height: 60vh; text-align: center; }
  .header { margin-top: 22px; }
  .header h2 { margin: 0 0 4px; font-size: 22px; }
  .header .path { color: var(--muted); font-size: 13px; word-break: break-all; }
  .header .path .branch { color: var(--good); border: 1px solid var(--border); border-radius: 6px; padding: 1px 7px; margin-left: 8px; font-size: 11px; }
  .backlink { display: inline-block; margin: 18px 0 2px; font-size: 13px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin: 22px 0; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px 16px; }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
  .card .value { font-size: 24px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .card .value.cost { color: var(--accent); }
  .card .value.good { color: var(--good); }
  .card .hint { color: var(--muted); font-size: 12px; margin-top: 4px; }

  .section { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; }
  .section h3 { margin: 0 0 14px; font-size: 14px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); }

  .budgetbar { position: relative; height: 24px; border-radius: 8px; background: var(--panel-2); overflow: hidden; }
  .budgetbar .fill { height: 100%; border-radius: 8px 0 0 8px; transition: width .2s; }
  .budgetbar .marker { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--text); opacity: .8; }
  .effgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .eff { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .eff .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }
  .eff .value { font-size: 20px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .eff .value.good { color: var(--good); }
  .eff .u { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 3px; }
  .budgetcap { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 12px; font-size: 13px; }
  .budgetcap b { font-variant-numeric: tabular-nums; }
  .split { display: flex; height: 14px; border-radius: 7px; overflow: hidden; background: var(--panel-2); }
  .split > div { height: 100%; }
  .legend { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 12px; }
  .legend .item { display: flex; align-items: center; gap: 7px; font-size: 13px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  .chart { display: flex; align-items: flex-end; gap: 3px; height: 150px; padding-top: 8px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; min-width: 2px; }
  .bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; }
  .bar:hover { opacity: .7; }
  .seg { width: 100%; }
  .seg:first-child { border-radius: 3px 3px 0 0; }
  .chart-x { display: flex; justify-content: space-between; color: var(--muted); font-size: 11px; margin-top: 6px; }

  /* Day-stat chips above the daily chart */
  .daystats { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 14px; }
  .daystat .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }
  .daystat .v { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .daystat .v small { color: var(--muted); font-weight: 400; font-size: 11px; }

  /* Activity punchcard (weekday × hour heatmap) */
  .heat { display: grid; grid-template-columns: 30px repeat(24, 1fr); gap: 2px; min-width: 540px; }
  .heat .rlab { color: var(--muted); font-size: 10px; display: flex; align-items: center; height: 15px; }
  .heat .cell { height: 15px; border-radius: 2px; background: var(--panel-2); }
  .heat .cell:hover { outline: 1px solid var(--text); }
  .heataxis { display: grid; grid-template-columns: 30px repeat(24, 1fr); gap: 2px; margin-top: 4px; }
  .heataxis span { color: var(--muted); font-size: 10px; text-align: center; }
  .heatwrap { overflow-x: auto; }

  /* Live-monitor control */
  .livebtn {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 11px; font-size: 13px; cursor: pointer;
  }
  .livebtn:hover { color: var(--text); }
  .livebtn .dot { background: var(--muted); }
  .livebtn.on { color: var(--good); border-color: var(--good); }
  .livebtn.on .dot { background: var(--good); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  .fb-spacer { flex: 1; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: .3px; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  th.sortable:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  .arrow { font-size: 10px; margin-left: 4px; color: var(--accent); }
  .title-cell { max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-link { cursor: pointer; }
  .row-link:hover { background: var(--panel-2); }
  .share { display: inline-block; width: 90px; height: 8px; border-radius: 4px; background: var(--panel-2); overflow: hidden; vertical-align: middle; }
  .share-fill { display: block; height: 100%; background: var(--accent); }

  .tools { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; }
  .chip b { color: var(--accent); margin-left: 5px; }
  .loading { color: var(--muted); }

  .prompt { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; background: var(--panel-2); }
  .prompt .when { color: var(--muted); font-size: 11px; margin-bottom: 5px; }
  .prompt .text { white-space: pre-wrap; word-break: break-word; font-size: 13px; max-height: 220px; overflow: auto; }
</style>
</head>
<body>
  <aside id="sidebar">
    <div class="brand">
      <h1>⬡ Claude Ledger</h1>
      <div class="sub" id="proj-dir">loading…</div>
    </div>
    <div class="proj-list" id="proj-list"><div class="loading" style="padding:12px">Scanning projects…</div></div>
  </aside>
  <main id="main">
    <div id="filterbar">
      <span class="fb-label">Range</span>
      <div class="presets" id="presets">
        <button data-preset="all" class="active">All time</button>
        <button data-preset="7">7d</button>
        <button data-preset="30">30d</button>
        <button data-preset="90">90d</button>
        <button data-preset="month">This month</button>
      </div>
      <span class="fb-label">Custom</span>
      <input type="date" id="from" class="dateinput" />
      <span class="fb-dash">–</span>
      <input type="date" id="to" class="dateinput" />
      <span class="fb-spacer"></span>
      <button id="live-toggle" class="livebtn" title="Auto-refresh every 20s"><span class="dot"></span>Live</button>
      <span class="fb-label" id="live-status"></span>
    </div>
    <div class="inner">
      <div class="empty" id="empty">
        <div>
          <div style="font-size:42px">⬡</div>
          <p>Select a project on the left to see its cost &amp; activity overview.</p>
        </div>
      </div>
      <div id="detail" style="display:none"></div>
    </div>
  </main>

<script>
const MODEL_COLORS = { opus: '#d97757', sonnet: '#6ea8fe', haiku: '#c6a15b' };
const fmtUSD = (n) => '$' + (n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtNum = (n) => (n || 0).toLocaleString('en-US');
function fmtTokens(n) {
  n = n || 0;
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}
function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}
function fmtDateTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function relTime(ts) {
  if (!ts) return '—';
  const diff = Date.now() - new Date(ts).getTime();
  const day = 86400000;
  if (diff < 3600000) return Math.max(1, Math.round(diff / 60000)) + 'm ago';
  if (diff < day) return Math.round(diff / 3600000) + 'h ago';
  if (diff < 30 * day) return Math.round(diff / day) + 'd ago';
  return fmtDate(ts);
}
function fmtDuration(start, end) {
  if (!start || !end) return '—';
  const ms = new Date(end).getTime() - new Date(start).getTime();
  if (ms < 0) return '—';
  const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m`;
  return `${s}s`;
}
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

// --- State ------------------------------------------------------------------
let PROJECTS = [];
let activeId = null;            // sidebar selection: '__all__' or folder id
let view = { type: 'overview', projectId: null, sessionId: null };
let range = { from: null, to: null };
let lastDaily = null;           // daily series of the loaded view (for today's-spend readout)

function qs() {
  const p = new URLSearchParams();
  if (range.from) p.set('from', range.from);
  if (range.to) p.set('to', range.to);
  const s = p.toString();
  return s ? '?' + s : '';
}

// --- Date range -------------------------------------------------------------
function localISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function presetRange(name) {
  const now = new Date();
  const to = localISO(now);
  if (name === 'all') return { from: null, to: null };
  if (name === 'month') return { from: `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`, to };
  const days = { '7': 6, '30': 29, '90': 89 }[name] || 0;
  return { from: localISO(new Date(now.getTime() - days * 86400000)), to };
}
function setActivePreset(name) {
  document.querySelectorAll('#presets button').forEach((b) => b.classList.toggle('active', b.dataset.preset === name));
}
function applyRange(newRange, presetName) {
  range = newRange;
  document.getElementById('from').value = newRange.from || '';
  document.getElementById('to').value = newRange.to || '';
  setActivePreset(presetName || null);
  loadProjects().then(() => refresh());
}

// --- Sessions table sorting -------------------------------------------------
const SESS_COLS = [
  { key: 'title', label: 'Title', num: false },
  { key: 'userPrompts', label: 'Prompts', num: true },
  { key: 'toolUses', label: 'Tools', num: true },
  { key: 'tokens', label: 'Tokens', num: true },
  { key: 'cost', label: 'Cost', num: true },
  { key: 'end', label: 'Last active', num: true },
];
let sessData = [];
let sessSort = { key: 'end', dir: 'desc' };
function sessionTokens(s) { return s.tokens.input + s.tokens.output + s.tokens.cacheRead + s.tokens.cacheWrite; }
function sessSortVal(s, key) {
  if (key === 'title') return (s.title || '').toLowerCase();
  if (key === 'tokens') return sessionTokens(s);
  if (key === 'end') return s.end || '';
  return s[key] || 0;
}
function renderSessions() {
  const body = document.getElementById('sess-body');
  if (!body) return;
  const { key, dir } = sessSort;
  const rows = sessData.slice().sort((a, b) => {
    const va = sessSortVal(a, key), vb = sessSortVal(b, key);
    let cmp;
    if (typeof va === 'number' && typeof vb === 'number') cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb));
    return dir === 'asc' ? cmp : -cmp;
  });
  body.innerHTML = rows.map((s) => {
    const tk = sessionTokens(s);
    return `<tr class="row-link" data-sid="${esc(s.id)}">
      <td class="title-cell" title="${esc(s.firstPrompt || s.title)}">${esc(s.title)}</td>
      <td class="num">${fmtNum(s.userPrompts)}</td>
      <td class="num">${fmtNum(s.toolUses)}</td>
      <td class="num">${fmtTokens(tk)}</td>
      <td class="num">${fmtUSD(s.cost)}</td>
      <td class="num">${relTime(s.end)}</td>
    </tr>`;
  }).join('');
  body.querySelectorAll('.row-link').forEach((node) =>
    node.addEventListener('click', () => openSession(view.projectId, node.dataset.sid))
  );
  document.querySelectorAll('#sess-head th').forEach((th) => {
    const active = th.dataset.key === key;
    th.classList.toggle('sorted', active);
    th.querySelector('.arrow').textContent = active ? (dir === 'asc' ? '▲' : '▼') : '';
  });
}
function onSessHeader(key) {
  if (sessSort.key === key) sessSort.dir = sessSort.dir === 'asc' ? 'desc' : 'asc';
  else sessSort = { key, dir: key === 'title' ? 'asc' : 'desc' };
  renderSessions();
}

// --- Leaderboard table sorting ----------------------------------------------
const LEAD_COLS = [
  { key: 'name', label: 'Project', num: false },
  { key: 'cost', label: 'Cost', num: true },
  { key: 'share', label: 'Share', num: true },
  { key: 'costPct', label: 'vs prev', num: true, trend: true },
  { key: 'sessions', label: 'Sessions', num: true },
  { key: 'userPrompts', label: 'Prompts', num: true },
  { key: 'cacheSavings', label: 'Cache saved', num: true },
  { key: 'lastActive', label: 'Last active', num: true },
];
let leadData = [];
let leadMax = 1;
let leadHasPrev = false;
let leadSort = { key: 'cost', dir: 'desc' };
function leadSortVal(p, key) {
  if (key === 'name') return (p.name || '').toLowerCase();
  if (key === 'lastActive') return p.lastActive || '';
  if (key === 'share') return p.cost; // Share is a visual of cost → sort by cost
  return p[key] || 0; // includes costPct (null/"new" treated as 0)
}
function renderLeaderboard() {
  const body = document.getElementById('lead-body');
  if (!body) return;
  const { key, dir } = leadSort;
  const rows = leadData.slice().sort((a, b) => {
    const va = leadSortVal(a, key), vb = leadSortVal(b, key);
    let cmp;
    if (typeof va === 'number' && typeof vb === 'number') cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb));
    return dir === 'asc' ? cmp : -cmp;
  });
  body.innerHTML = rows.map((p) => `
    <tr class="row-link" data-id="${esc(p.id)}">
      <td class="title-cell" title="${esc(p.cwd)}">${esc(p.name)}</td>
      <td class="num">${fmtUSD(p.cost)}</td>
      <td class="num"><span class="share"><span class="share-fill" style="width:${(p.cost / leadMax * 100).toFixed(1)}%"></span></span></td>
      ${leadHasPrev ? `<td class="num">${trendCell(p)}</td>` : ''}
      <td class="num">${fmtNum(p.sessions)}</td>
      <td class="num">${fmtNum(p.userPrompts)}</td>
      <td class="num good">${fmtUSD(p.cacheSavings)}</td>
      <td class="num">${relTime(p.lastActive)}</td>
    </tr>`).join('');
  body.querySelectorAll('.row-link').forEach((node) =>
    node.addEventListener('click', () => selectProject(node.dataset.id))
  );
  document.querySelectorAll('#lead-head th').forEach((th) => {
    const active = th.dataset.key && th.dataset.key === key;
    th.classList.toggle('sorted', !!active);
    const arrow = th.querySelector('.arrow');
    if (arrow) arrow.textContent = active ? (dir === 'asc' ? '▲' : '▼') : '';
  });
}
function onLeadHeader(key) {
  if (!key) return;
  if (leadSort.key === key) leadSort.dir = leadSort.dir === 'asc' ? 'desc' : 'asc';
  else leadSort = { key, dir: key === 'name' ? 'asc' : 'desc' };
  renderLeaderboard();
}

// --- Shared render helpers --------------------------------------------------
function modelSplit(costByFamily, total) {
  const fams = Object.entries(costByFamily).sort((a, b) => b[1] - a[1]);
  if (!fams.length || total <= 0) return '<div class="loading">No spend in range.</div>';
  const bar = fams.map(([f, c]) => `<div style="width:${(c / total * 100).toFixed(2)}%;background:${MODEL_COLORS[f] || '#888'}"></div>`).join('');
  const legend = fams.map(([f, c]) => `<span class="item"><span class="dot" style="background:${MODEL_COLORS[f] || '#888'}"></span>${esc(f)} — ${fmtUSD(c)} (${(c / total * 100).toFixed(0)}%)</span>`).join('');
  return `<div class="split">${bar}</div><div class="legend">${legend}</div>`;
}
// DOM order for stacked segments: last child sits at the bottom of the bar, so
// opus (usually the largest) anchors the stack and haiku caps it.
const FAM_ORDER = ['haiku', 'sonnet', 'opus'];
function dailyChart(daily) {
  if (!daily.length) return '<div class="loading">No dated activity in range.</div>';
  const max = Math.max(...daily.map((d) => d.cost), 0.0001);
  const bars = daily.map((d) => {
    const cbf = d.costByFamily || { opus: d.cost };
    const present = FAM_ORDER.filter((f) => cbf[f] > 0);
    const segs = present.map((f) =>
      `<div class="seg" style="height:${(cbf[f] / max * 142).toFixed(2)}px;background:${MODEL_COLORS[f]}"></div>`).join('');
    const bd = Object.entries(cbf).filter(([, c]) => c > 0).sort((a, b) => b[1] - a[1])
      .map(([f, c]) => `${f} ${fmtUSD(c)}`).join(' · ');
    const inner = segs || `<div class="bar" style="height:${(d.cost / max * 142).toFixed(1)}px"></div>`;
    return `<div class="bar-wrap" title="${esc(d.date)} — ${fmtUSD(d.cost)} · ${d.messages} msgs${bd ? '\n' + bd : ''}">${inner}</div>`;
  }).join('');
  return `<div class="chart">${bars}</div>
    <div class="chart-x"><span>${esc(daily[0].date)}</span><span>peak ${fmtUSD(max)}/day</span><span>${esc(daily[daily.length - 1].date)}</span></div>`;
}
// Quick callouts derived from the daily series (active days, average, extremes).
function dayStatsRow(daily) {
  const active = (daily || []).filter((d) => d.cost > 0);
  if (!active.length) return '';
  const total = active.reduce((s, d) => s + d.cost, 0);
  const priciest = active.reduce((a, b) => (b.cost > a.cost ? b : a));
  const busiest = active.reduce((a, b) => (b.messages > a.messages ? b : a));
  const stat = (k, v) => `<div class="daystat"><div class="k">${k}</div><div class="v">${v}</div></div>`;
  return `<div class="daystats">
    ${stat('Active days', fmtNum(active.length))}
    ${stat('Avg / active day', fmtUSD(total / active.length))}
    ${stat('Priciest day', `${fmtUSD(priciest.cost)} <small>${esc(priciest.date)}</small>`)}
    ${stat('Busiest day', `${fmtNum(busiest.messages)} <small>msgs · ${esc(busiest.date)}</small>`)}
  </div>`;
}
// Weekday × hour spend heatmap. Display rows Mon→Sun; cost drives accent opacity.
const WD_ORDER = [1, 2, 3, 4, 5, 6, 0];
const WD_LABEL = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
function punchcardSection(pc) {
  if (!pc || !pc.cost) return '';
  let max = 0, total = 0;
  for (let w = 0; w < 7; w++) for (let h = 0; h < 24; h++) { const c = pc.cost[w][h]; total += c; if (c > max) max = c; }
  if (total <= 0) return '';
  const rows = WD_ORDER.map((w) => {
    const cells = pc.cost[w].map((c, h) => {
      const bg = c > 0 ? `rgba(217,119,87,${(0.14 + 0.86 * (c / max)).toFixed(3)})` : 'var(--panel-2)';
      return `<div class="cell" style="background:${bg}" title="${WD_LABEL[w]} ${String(h).padStart(2, '0')}:00 UTC — ${fmtUSD(c)} · ${fmtNum(pc.messages[w][h])} msgs"></div>`;
    }).join('');
    return `<div class="rlab">${WD_LABEL[w]}</div>${cells}`;
  }).join('');
  const axis = '<span></span>' + Array.from({ length: 24 }, (_, h) => `<span>${h % 6 === 0 ? h : ''}</span>`).join('');
  return `<div class="section"><h3>Activity by hour (UTC)</h3>
    <div class="heatwrap"><div class="heat">${rows}</div><div class="heataxis">${axis}</div></div>
    <div class="hint" style="margin-top:8px">Spend intensity by weekday × hour (UTC). Darker = more spend in that hour · peak ${fmtUSD(max)}/hr.</div>
  </div>`;
}
function efficiencySection(e) {
  if (!e || e.cost <= 0) return '';
  const c = e.composition;
  const ct = c.output + c.input + c.cacheRead + c.cacheWrite;
  const segs = [
    ['output', c.output, '#6ea8fe'],
    ['cache write', c.cacheWrite, '#d97757'],
    ['fresh input', c.input, '#c6a15b'],
    ['cache read', c.cacheRead, '#5dd6a0'],
  ].filter((s) => s[1] > 0);
  const bar = ct > 0 ? segs.map(([, v, col]) => `<div style="width:${(v / ct * 100).toFixed(2)}%;background:${col}"></div>`).join('') : '';
  const legend = ct > 0 ? segs.map(([l, v, col]) => `<span class="item"><span class="dot" style="background:${col}"></span>${l} — ${fmtUSD(v)} (${(v / ct * 100).toFixed(0)}%)</span>`).join('') : '';
  const wi = (fam) => {
    const cost = e.whatIf[fam];
    const delta = e.cost > 0 ? (cost - e.cost) / e.cost : 0;
    const col = delta < -0.005 ? 'var(--good)' : (delta > 0.005 ? 'var(--warn)' : 'var(--muted)');
    const sign = delta < 0 ? '−' : (delta > 0 ? '+' : '');
    const label = fam.charAt(0).toUpperCase() + fam.slice(1);
    return `${label} ≈ <b>${fmtUSD(cost)}</b> <span style="color:${col}">(${sign}${Math.abs(delta * 100).toFixed(0)}%)</span>`;
  };
  return `<div class="section">
    <h3>Efficiency</h3>
    <div class="effgrid">
      <div class="eff"><div class="label">Cache hit rate</div><div class="value good">${(e.cacheHitRate * 100).toFixed(1)}%</div></div>
      <div class="eff"><div class="label">Blended rate</div><div class="value">${fmtUSD(e.blendedPerMtok)}<span class="u">/1M tok</span></div></div>
      <div class="eff"><div class="label">Output share</div><div class="value">${(e.outputShare * 100).toFixed(1)}%</div></div>
      <div class="eff"><div class="label">Tokens / prompt</div><div class="value">${fmtTokens(Math.round(e.tokensPerPrompt))}</div></div>
      <div class="eff"><div class="label">Tools / prompt</div><div class="value">${e.toolsPerPrompt.toFixed(1)}</div></div>
    </div>
    <div style="margin-top:18px">
      <div class="label" style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px">Where the money goes</div>
      <div class="split">${bar}</div>
      <div class="legend">${legend}</div>
    </div>
    <div class="hint" style="margin-top:18px">Same token usage priced on another model: ${wi('sonnet')} · ${wi('haiku')} <span style="opacity:.7">— what the tokens would cost, not a quality comparison.</span></div>
  </div>`;
}
function budgetSection(b) {
  if (!b) return '';
  const monthLabel = new Date(b.today + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const pace = `${b.daysElapsed} of ${b.daysInMonth} days elapsed`;
  if (b.monthly == null) {
    return `<div class="section">
      <h3>This month — ${esc(monthLabel)}</h3>
      <div class="cards" style="margin:0">
        <div class="card"><div class="label">Month to date</div><div class="value cost">${fmtUSD(b.mtdCost)}</div><div class="hint">${pace}</div></div>
        <div class="card"><div class="label">Projected (month end)</div><div class="value cost">${fmtUSD(b.projectedCost)}</div><div class="hint">at current pace</div></div>
      </div>
      <div class="hint" style="margin-top:12px">Set a budget to track it here — add <code>"monthlyBudget"</code> to <code>config.json</code> or set the <code>MONTHLY_BUDGET</code> env var.</div>
    </div>`;
  }
  const usedW = Math.min(b.pctUsed * 100, 100);
  const projW = Math.min(b.pctProjected * 100, 100);
  const color = b.pctProjected > 1 ? 'var(--warn)' : (b.pctProjected > 0.9 ? 'var(--haiku)' : 'var(--good)');
  const remColor = b.remaining < 0 ? 'var(--warn)' : 'var(--good)';
  const over = b.pctProjected > 1;
  return `<div class="section">
    <h3>This month — ${esc(monthLabel)}</h3>
    <div class="budgetbar">
      <div class="fill" style="width:${usedW.toFixed(1)}%;background:${color}"></div>
      <div class="marker" style="left:${projW.toFixed(1)}%" title="projected ${fmtUSD(b.projectedCost)}"></div>
    </div>
    <div class="budgetcap">
      <span><b>${fmtUSD(b.mtdCost)}</b> spent <span class="loading">(${(b.pctUsed * 100).toFixed(0)}%)</span></span>
      <span>projected <b style="color:${color}">${fmtUSD(b.projectedCost)}</b> <span class="loading">(${(b.pctProjected * 100).toFixed(0)}%)</span></span>
      <span class="loading">budget ${fmtUSD(b.monthly)}</span>
      <span style="color:${remColor}">${b.remaining >= 0 ? fmtUSD(b.remaining) + ' left' : fmtUSD(-b.remaining) + ' over'}</span>
    </div>
    ${over ? `<div class="hint" style="margin-top:10px;color:var(--warn)">⚠ On pace to exceed budget by ${fmtUSD(b.projectedCost - b.monthly)} — ${pace}.</div>` : `<div class="hint" style="margin-top:10px">On track — ${pace}.</div>`}
  </div>`;
}
function deltaChip(change, pct, mode) {
  if (change == null) return '';
  const eps = 0.005;
  const dir = change > eps ? 'up' : (change < -eps ? 'down' : 'flat');
  const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '▬');
  let color = 'var(--muted)';
  if (mode === 'cost') color = dir === 'up' ? 'var(--warn)' : (dir === 'down' ? 'var(--good)' : 'var(--muted)');
  if (pct == null) return `<span style="color:var(--muted)">new</span>`;
  const pctStr = (pct >= 0 ? '+' : '') + (pct * 100).toFixed(0) + '%';
  return `<span style="color:${color}">${arrow} ${pctStr}</span>`;
}
function trendCell(p) {
  if (p.costPrev == null) return '—';
  return deltaChip(p.cost - p.costPrev, p.costPct, 'cost');
}
function deltaHint(delta, kind, fallback) {
  if (!delta) return fallback;
  if (kind === 'cost') return `${deltaChip(delta.costChange, delta.costPct, 'cost')} vs prev ${delta.days}d`;
  return `${deltaChip(delta.promptsChange, delta.promptsPct, 'neutral')} vs prev ${delta.days}d`;
}
function toolChips(topTools) {
  return topTools.length
    ? topTools.slice(0, 24).map((t) => `<span class="chip">${esc(t.name)}<b>${fmtNum(t.count)}</b></span>`).join('')
    : '<span class="loading">No tool calls recorded.</span>';
}
// Spend attributed to a named driver (skill / MCP server) — chip shows its cost.
// Rendered only when there's attributed spend; not all turns carry attribution.
function spendSection(title, items, hint) {
  if (!items || !items.length) return '';
  const chips = items.slice(0, 24)
    .map((t) => `<span class="chip">${esc(t.name)}<b>${fmtUSD(t.cost)}</b></span>`).join('');
  return `<div class="section"><h3>${esc(title)}</h3><div class="tools">${chips}</div>
    <div class="hint" style="margin-top:8px">${esc(hint)}</div></div>`;
}

function renderProjectList() {

// --- Navigation -------------------------------------------------------------
function selectProject(id) {
  activeId = id;
  view = { type: id === '__all__' ? 'overview' : 'project', projectId: id, sessionId: null };
  renderProjectList();
  refresh();
}
function openSession(projectId, sessionId) {
  view = { type: 'session', projectId, sessionId };
  refresh();
}
// silent=true is the live-refresh path: don't blank to "Loading…", keep the
// user's table sort + scroll position, and leave the view intact on error.
async function refresh(silent) {
  const main = document.getElementById('main');
  const scroll = main ? main.scrollTop : 0;
  document.getElementById('empty').style.display = 'none';
  const detail = document.getElementById('detail');
  detail.style.display = 'block';
  if (!silent) detail.innerHTML = '<div class="loading" style="margin-top:24px">Loading…</div>';
  try {
    if (view.type === 'overview') {
      const res = await fetch('/api/overview' + qs());
      if (!res.ok) throw new Error('overview');
      renderOverview(await res.json(), { preserve: silent });
    } else if (view.type === 'project') {
      const res = await fetch('/api/project/' + encodeURIComponent(view.projectId) + qs());
      if (!res.ok) throw new Error('project');
      renderDetail(await res.json(), { preserve: silent });
    } else if (view.type === 'session') {
      const res = await fetch('/api/session/' + encodeURIComponent(view.projectId) + '/' + encodeURIComponent(view.sessionId));
      if (!res.ok) throw new Error('session');
      renderSession(await res.json());
    }
    if (silent && main) main.scrollTop = scroll;
  } catch (e) {
    if (!silent) detail.innerHTML = '<div class="loading" style="margin-top:24px">Failed to load (' + esc(e.message) + ').</div>';
  }
}

// --- Live monitoring --------------------------------------------------------
// Polls the current view on an interval so the dashboard tracks an in-progress
// session's spend. Parsing is mtime-cached server-side, so ticks are cheap.
const LIVE = { on: false, ms: 20000, fetchTimer: null, tickTimer: null, lastAt: null, busy: false };
function todaySpend() {
  if (!lastDaily) return null;
  const today = new Date().toISOString().slice(0, 10); // UTC, matches the day-keys
  const e = lastDaily.find((d) => d.date === today);
  return e ? e.cost : 0;
}
function agoStr(t) {
  const s = Math.max(0, Math.round((Date.now() - t) / 1000));
  return s < 60 ? s + 's ago' : Math.round(s / 60) + 'm ago';
}
function renderLiveStatus() {
  const el = document.getElementById('live-status');
  if (!el) return;
  if (!LIVE.on) { el.textContent = ''; return; }
  const parts = [];
  const ts = todaySpend();
  if (ts != null) parts.push('today ' + fmtUSD(ts));
  if (LIVE.busy) parts.push('updating…');
  else if (LIVE.lastAt) parts.push('updated ' + agoStr(LIVE.lastAt));
  el.textContent = parts.join('  ·  ');
}
async function liveTick() {
  if (LIVE.busy) return;
  LIVE.busy = true; renderLiveStatus();
  try { await loadProjects(); await refresh(true); LIVE.lastAt = Date.now(); }
  catch (e) { /* keep the last good view; try again next tick */ }
  finally { LIVE.busy = false; renderLiveStatus(); }
}
function stopLiveTimers() {
  if (LIVE.fetchTimer) clearInterval(LIVE.fetchTimer);
  if (LIVE.tickTimer) clearInterval(LIVE.tickTimer);
  LIVE.fetchTimer = LIVE.tickTimer = null;
}
function startLiveTimers() {
  stopLiveTimers();
  LIVE.fetchTimer = setInterval(liveTick, LIVE.ms);
  LIVE.tickTimer = setInterval(renderLiveStatus, 1000); // keep the "Ns ago" fresh
}
function setLive(on) {
  LIVE.on = on;
  try { localStorage.setItem('ledger.live', on ? '1' : '0'); } catch (e) {}
  const btn = document.getElementById('live-toggle');
  if (btn) btn.classList.toggle('on', on);
  if (on) { startLiveTimers(); liveTick(); } else { stopLiveTimers(); renderLiveStatus(); }
}

      <div class="card"><div class="label">Total tokens</div><div class="value">${fmtTokens(totalTokens)}</div><div class="hint">${fmtTokens(t.tokens.output)} output</div></div>
      <div class="card"><div class="label">Duration</div><div class="value">${fmtDuration(d.start, d.end)}</div><div class="hint">wall clock</div></div>
      <div class="card"><div class="label">Cache savings</div><div class="value good">${fmtUSD(d.cacheSavings)}</div><div class="hint">${fmtTokens(t.tokens.cacheRead)} read</div></div>
    </div>
    <div class="section"><h3>Spend by model</h3>${modelSplit(t.costByFamily, t.cost)}</div>
    <div class="section"><h3>Cost per turn</h3>${timeline}</div>
    <div class="section"><h3>Top tools</h3><div class="tools">${toolChips(d.topTools)}</div></div>
    <div class="section">
      <h3>Prompts (${d.prompts.length})</h3>
      ${d.prompts.length ? d.prompts.map((p, i) => `<div class="prompt"><div class="when">#${i + 1} · ${fmtDateTime(p.ts)}</div><div class="text">${esc(p.text)}</div></div>`).join('') : '<div class="loading">No user prompts recorded.</div>'}
    </div>`;
  document.getElementById('sess-back').addEventListener('click', () => selectProject(d.projectId));
}

// --- Init -------------------------------------------------------------------
async function init() {
  document.querySelectorAll('#presets button').forEach((b) =>
    b.addEventListener('click', () => applyRange(presetRange(b.dataset.preset), b.dataset.preset))
  );
  ['from', 'to'].forEach((id) =>
    document.getElementById(id).addEventListener('change', () => {
      const from = document.getElementById('from').value || null;
      const to = document.getElementById('to').value || null;
      applyRange({ from, to }, null);
    })
  );
  document.getElementById('live-toggle').addEventListener('click', () => setLive(!LIVE.on));
  document.addEventListener('visibilitychange', () => {
    if (!LIVE.on) return;
    if (document.hidden) stopLiveTimers();      // pause polling in a background tab
    else { startLiveTimers(); liveTick(); }     // catch up on return
  });

  const data = await loadProjects();
  if (data.bounds) {
    ['from', 'to'].forEach((id) => {
      const el = document.getElementById(id);
      if (data.bounds.min) el.min = data.bounds.min;
      if (data.bounds.max) el.max = data.bounds.max;
    });
  }
  if (PROJECTS.length) selectProject('__all__');

  let wantLive = false;
  try { wantLive = localStorage.getItem('ledger.live') === '1'; } catch (e) {}
  if (wantLive && PROJECTS.length) setLive(true);
}

init().catch((e) => {
  document.getElementById('proj-list').innerHTML = '<div class="loading" style="padding:12px">Error: ' + esc(e.message) + '</div>';
});
</script>
</body>
</html>
