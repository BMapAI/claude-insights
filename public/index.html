<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Ledger — ROI</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1d212b;
    --border: #272c38;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #d97757;
    --accent-2: #6ea8fe;
    --good: #5dd6a0;
    --warn: #e5683f;
    --opus: #d97757;
    --sonnet: #6ea8fe;
    --haiku: #c6a15b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
  }
  a { color: var(--accent-2); cursor: pointer; }
  :focus-visible { outline: 2px solid var(--accent-2); outline-offset: 2px; border-radius: 4px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
  }

  #sidebar {
    width: 320px; min-width: 320px; height: 100vh; overflow-y: auto;
    background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .brand { padding: 18px 18px 12px; border-bottom: 1px solid var(--border); }
  .brand h1 { font-size: 16px; margin: 0; letter-spacing: .2px; }
  .brand .sub { color: var(--muted); font-size: 12px; margin-top: 4px; word-break: break-all; }
  .proj-list { padding: 8px; }
  .proj { width: 100%; display: block; text-align: left; font: inherit; color: inherit; background: transparent; padding: 11px 12px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; margin-bottom: 4px; }
  .proj:hover { background: var(--panel-2); }
  .proj.active { background: var(--panel-2); border-color: var(--accent); }
  .proj.idle { opacity: .45; }                 /* no activity in the selected range — dimmed but still navigable */
  .proj.idle:hover, .proj.active { opacity: 1; }
  .proj.all { border-color: var(--border); background: var(--panel-2); margin-bottom: 10px; }
  .proj.all.active { border-color: var(--accent); }
  .proj .name { font-weight: 600; display: flex; justify-content: space-between; gap: 8px; }
  .proj .name .cost { color: var(--accent); font-variant-numeric: tabular-nums; }
  .proj .meta { color: var(--muted); font-size: 12px; margin-top: 3px; display: flex; justify-content: space-between; }

  #main { flex: 1; height: 100vh; overflow-y: auto; }
  .inner { padding: 0 32px 32px; }

  /* Filter bar */
  #filterbar {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 14px 32px; background: rgba(15,17,21,.85); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .fb-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
  .presets { display: flex; gap: 6px; }
  .presets button {
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 11px; font-size: 13px; cursor: pointer;
  }
  .presets button:hover { color: var(--text); }
  .presets button.active { background: var(--accent); color: #1a1109; border-color: var(--accent); font-weight: 600; }
  .dateinput {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 9px; font-size: 13px; color-scheme: dark;
  }
  .fb-dash { color: var(--muted); }

  .empty { color: var(--muted); display: grid; place-items: center; height: 60vh; text-align: center; }
  .header { margin-top: 22px; }
  .header h2 { margin: 0 0 4px; font-size: 22px; }
  .header .path { color: var(--muted); font-size: 13px; word-break: break-all; }
  .header .path .branch { color: var(--good); border: 1px solid var(--border); border-radius: 6px; padding: 1px 7px; margin-left: 8px; font-size: 11px; }
  .backlink { display: inline-block; margin: 18px 0 2px; font-size: 13px; background: none; border: 0; padding: 0; font-family: inherit; color: var(--accent-2); cursor: pointer; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin: 22px 0; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px 16px; }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; }
  .card .value { font-size: 24px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .card .value.cost { color: var(--accent); }
  .card .value.good { color: var(--good); }
  .card .hint { color: var(--muted); font-size: 12px; margin-top: 4px; }

  .section { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; }
  .section h3 { margin: 0 0 14px; font-size: 14px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); }
  .csvlink { font-size: 11px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--accent-2); margin-left: 10px; }
  .badge { font-size: 10px; color: var(--muted); border: 1px solid var(--border); border-radius: 5px; padding: 0 5px; margin-left: 6px; vertical-align: middle; }
  .insights { border-color: var(--accent); }
  .insights h3 { color: var(--accent); }
  .insight-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .insight { display: flex; gap: 10px; align-items: flex-start; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; }
  .insight-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex: 0 0 auto; }
  .insight-title { font-weight: 600; font-size: 13px; }
  .insight-detail { color: var(--muted); font-size: 12px; margin-top: 3px; line-height: 1.45; }

  /* ROI verdict — the glanceable "is the AI paying off?" headline + sub-scores. */
  .verdict { border-width: 1px; }
  .vhead { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
  .vicon { font-size: 22px; line-height: 1.1; }
  .vtitle { font-size: 19px; font-weight: 700; }
  .vsummary { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .vrows { display: grid; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .vrow { display: grid; grid-template-columns: 150px 150px 1fr; gap: 12px; align-items: baseline; background: var(--panel); padding: 11px 14px; }
  .vk { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }
  .vv { font-size: 15px; font-variant-numeric: tabular-nums; }
  .vh { color: var(--muted); font-size: 12px; line-height: 1.4; }
  @media (max-width: 720px) { .vrow { grid-template-columns: 1fr; gap: 3px; } }
  .wl-headline { font-size: 15px; font-weight: 600; }
  .wl-meta { color: var(--muted); font-size: 12px; font-weight: 400; }
  .wl-projects { margin-top: 14px; display: grid; gap: 10px; }
  .wl-proj { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 13px; }
  .wl-titles { margin: 6px 0 0; padding-left: 18px; color: var(--muted); font-size: 12px; }
  .wl-titles li { margin: 2px 0; }

  .budgetbar { position: relative; height: 24px; border-radius: 8px; background: var(--panel-2); overflow: hidden; }
  .budgetbar .fill { height: 100%; border-radius: 8px 0 0 8px; transition: width .2s; }
  .budgetbar .marker { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--text); opacity: .8; }
  .effgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .eff { background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .eff .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }
  .eff .value { font-size: 20px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .eff .value.good { color: var(--good); }
  .eff .u { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 3px; }
  .budgetcap { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 12px; font-size: 13px; }
  .budgetcap b { font-variant-numeric: tabular-nums; }
  .split { display: flex; height: 14px; border-radius: 7px; overflow: hidden; background: var(--panel-2); }
  .split > div { height: 100%; }
  .legend { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 12px; }
  .legend .item { display: flex; align-items: center; gap: 7px; font-size: 13px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  .chart { display: flex; align-items: flex-end; gap: 3px; height: 150px; padding-top: 8px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; min-width: 2px; }
  .bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; }
  .bar:hover { opacity: .7; }
  .seg { width: 100%; }
  .seg:first-child { border-radius: 3px 3px 0 0; }
  .chart-x { display: flex; justify-content: space-between; color: var(--muted); font-size: 11px; margin-top: 6px; }

  /* Day-stat chips above the daily chart */
  .daystats { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 14px; }
  .daystat .k { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; }
  .daystat .v { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .daystat .v small { color: var(--muted); font-weight: 400; font-size: 11px; }

  /* Activity heatmap (date × hour) + clickable day list */
  .heat { display: grid; grid-template-columns: 56px repeat(24, 1fr); gap: 2px; min-width: 560px; }
  .heat .rlab { color: var(--muted); font-size: 10px; display: flex; align-items: center; height: 15px; }
  .heat .cell { height: 15px; border-radius: 2px; background: var(--panel-2); }
  .heat .cell:hover { outline: 1px solid var(--text); }
  .heataxis { display: grid; grid-template-columns: 56px repeat(24, 1fr); gap: 2px; margin-top: 4px; }
  .heataxis span { color: var(--muted); font-size: 10px; text-align: center; }
  .heatwrap { overflow-x: auto; }
  .daylist { display: grid; gap: 6px; }
  .dayrow { display: grid; grid-template-columns: 76px 1fr 88px; gap: 12px; align-items: center; width: 100%; text-align: left; font: inherit; color: inherit; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; cursor: pointer; }
  .dayrow:hover { border-color: var(--accent); }
  .dayrow .daybar { height: 8px; border-radius: 4px; background: var(--panel); overflow: hidden; }
  .dayrow .daybar > span { display: block; height: 100%; background: var(--accent); }
  .dayrow .daycost { text-align: right; color: var(--accent); font-variant-numeric: tabular-nums; }

  /* Live-monitor control */
  .livebtn {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 11px; font-size: 13px; cursor: pointer;
  }
  .livebtn:hover { color: var(--text); }
  .livebtn .dot { background: var(--muted); }
  .livebtn.on { color: var(--good); border-color: var(--good); }
  .livebtn.on .dot { background: var(--good); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  .fb-spacer { flex: 1; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: .3px; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  th.sortable:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  .arrow { font-size: 10px; margin-left: 4px; color: var(--accent); }
  .title-cell { max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-link { cursor: pointer; }
  .row-link:hover { background: var(--panel-2); }
  .rowbtn { display: block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: none; border: 0; padding: 0; margin: 0; font: inherit; color: inherit; text-align: left; cursor: pointer; }
  .share { display: inline-block; width: 90px; height: 8px; border-radius: 4px; background: var(--panel-2); overflow: hidden; vertical-align: middle; }
  .share-fill { display: block; height: 100%; background: var(--accent); }

  .tools { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; }
  .chip b { color: var(--accent); margin-left: 5px; }
  .loading { color: var(--muted); }

  .prompt { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; background: var(--panel-2); }
  .prompt .when { color: var(--muted); font-size: 11px; margin-bottom: 5px; }
  .prompt .text { white-space: pre-wrap; word-break: break-word; font-size: 13px; max-height: 220px; overflow: auto; }

  /* Narrow screens: stack the sidebar above the content instead of a fixed
     320px full-height column, ease the heavy horizontal padding, and let the
     page scroll as one document rather than two independent 100vh panes. The
     heatmap already lives in an overflow-x:auto wrapper, so it scrolls in place. */
  @media (max-width: 720px) {
    html, body { height: auto; }
    body { flex-direction: column; min-height: 100%; }
    #sidebar { width: 100%; min-width: 0; height: auto; max-height: 42vh; border-right: 0; border-bottom: 1px solid var(--border); }
    #main { height: auto; }
    .inner { padding: 0 16px 24px; }
    #filterbar { padding: 12px 16px; gap: 10px; }
    .cards { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .insight-list, .effgrid { grid-template-columns: 1fr; }
    .title-cell { max-width: 200px; }
  }
</style>
</head>
<body>
  <aside id="sidebar">
    <div class="brand">
      <h1>⬡ Claude Ledger</h1>
      <div class="sub" id="proj-dir">loading…</div>
    </div>
    <div class="proj-list" id="proj-list"><div class="loading" style="padding:12px">Scanning projects…</div></div>
  </aside>
  <main id="main">
    <div id="filterbar">
      <span class="fb-label">Range</span>
      <div class="presets" id="presets">
        <button data-preset="today">Today</button>
        <button data-preset="yesterday">Yesterday</button>
        <button data-preset="week">This week</button>
        <button data-preset="lastweek">Last week</button>
        <button data-preset="month" class="active">This month</button>
        <button data-preset="lastmonth">Last month</button>
        <button data-preset="7">7d</button>
        <button data-preset="30">30d</button>
        <button data-preset="90">90d</button>
        <button data-preset="all">All time</button>
      </div>
      <span class="fb-label">Custom</span>
      <input type="date" id="from" class="dateinput" />
      <span class="fb-dash">–</span>
      <input type="date" id="to" class="dateinput" />
      <span class="fb-spacer"></span>
      <button id="live-toggle" class="livebtn" title="Auto-refresh every 20s"><span class="dot"></span>Live</button>
      <span class="fb-label" id="live-status" aria-live="polite"></span>
    </div>
    <div class="inner">
      <div class="empty" id="empty">
        <div>
          <div style="font-size:42px">⬡</div>
          <p>Select a project on the left to see its cost &amp; activity overview.</p>
        </div>
      </div>
      <div id="detail" style="display:none"></div>
    </div>
  </main>

<script>
const MODEL_COLORS = { opus: '#d97757', sonnet: '#6ea8fe', haiku: '#c6a15b' };
const fmtUSD = (n) => '$' + (n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtNum = (n) => (n || 0).toLocaleString('en-US');
function fmtTokens(n) {
  n = n || 0;
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}
function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}
// A date span, collapsed to a single date when both ends fall on the same day
// (e.g. the Today / Yesterday ranges) so it doesn't read "Jun 10 → Jun 10".
function fmtRange(start, end) {
  const a = fmtDate(start), b = fmtDate(end);
  return a === b ? a : `${a} → ${b}`;
}
function fmtDateTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function relTime(ts) {
  if (!ts) return '—';
  const diff = Date.now() - new Date(ts).getTime();
  const day = 86400000;
  if (diff < 3600000) return Math.max(1, Math.round(diff / 60000)) + 'm ago';
  if (diff < day) return Math.round(diff / 3600000) + 'h ago';
  if (diff < 30 * day) return Math.round(diff / day) + 'd ago';
  return fmtDate(ts);
}
function fmtMs(ms) {
  ms = ms || 0;
  if (ms >= 3600000) return (ms / 3600000).toFixed(1) + 'h';
  if (ms >= 60000) return (ms / 60000).toFixed(1) + 'm';
  if (ms >= 1000) return (ms / 1000).toFixed(1) + 's';
  return Math.round(ms) + 'ms';
}
function fmtDuration(start, end) {
  if (!start || !end) return '—';
  const ms = new Date(end).getTime() - new Date(start).getTime();
  if (ms < 0) return '—';
  const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m`;
  return `${s}s`;
}
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

// --- State ------------------------------------------------------------------
let PROJECTS = [];
let activeId = null;            // sidebar selection: '__all__' or folder id
let view = { type: 'overview', projectId: null, sessionId: null };
let range = { from: null, to: null };
let preset = 'month';           // active preset name, or null for a custom date range
let lastDaily = null;           // daily series of the loaded view (for today's-spend readout)
let activityData = null;        // `hourly` map { 'YYYY-MM-DD': { cost:[24], messages:[24] } }
let activityRange = null;       // resolved { from, to } the activity panel covers
let activityDay = null;         // drill-down: the day whose hours are shown (>7d view), or null
const PRESET_NAMES = ['all', 'today', 'yesterday', 'week', 'lastweek', 'month', 'lastmonth', '7', '30', '90'];

function qs() {
  const p = new URLSearchParams();
  if (range.from) p.set('from', range.from);
  if (range.to) p.set('to', range.to);
  const s = p.toString();
  return s ? '?' + s : '';
}

// --- URL state (shareable / bookmarkable views) -----------------------------
// Reflect the current project/session/range in the address bar so a view can be
// linked, bookmarked, and walked with the browser's back/forward buttons.
function browserQuery() {
  const p = new URLSearchParams();
  if (view.type === 'project' || view.type === 'session') p.set('project', view.projectId);
  if (view.type === 'session') p.set('session', view.sessionId);
  // Encode the chosen preset by name so it survives reload/sharing; 'month' is
  // the default, so it's left implicit (absence of params → this month). A true
  // custom range (no preset) is stored as explicit from/to dates.
  if (preset) { if (preset !== 'month') p.set('range', preset); }
  else { if (range.from) p.set('from', range.from); if (range.to) p.set('to', range.to); }
  return p.toString();
}
function syncURL() {
  const q = browserQuery();
  try { history.pushState(null, '', q ? location.pathname + '?' + q : location.pathname); } catch (e) {}
}
function applyURLState() {
  const p = new URLSearchParams(location.search);
  const rangeName = p.get('range');
  const from = p.get('from') || null;
  const to = p.get('to') || null;
  if (rangeName && PRESET_NAMES.includes(rangeName)) { preset = rangeName; range = presetRange(rangeName); }
  else if (from || to) { preset = null; range = { from, to }; }   // explicit custom range
  else { preset = 'month'; range = presetRange('month'); }        // default: this month
  document.getElementById('from').value = range.from || '';
  document.getElementById('to').value = range.to || '';
  setActivePreset(preset);
  const project = p.get('project');
  const session = p.get('session');
  if (project && session) { activeId = project; view = { type: 'session', projectId: project, sessionId: session }; }
  else if (project) { activeId = project; view = { type: 'project', projectId: project, sessionId: null }; }
  else { activeId = '__all__'; view = { type: 'overview', projectId: '__all__', sessionId: null }; }
}

// --- Date range -------------------------------------------------------------
function localISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function presetRange(name) {
  const now = new Date();
  const to = localISO(now);
  const mfirst = (y, m) => `${y}-${String(m + 1).padStart(2, '0')}-01`;          // first day of month m (0-based)
  if (name === 'all') return { from: null, to: null };
  if (name === 'today') return { from: to, to };
  if (name === 'yesterday') { const y = localISO(new Date(now.getTime() - 86400000)); return { from: y, to: y }; }
  if (name === 'week' || name === 'lastweek') {
    const dow = (now.getDay() + 6) % 7;                                          // 0 = Monday … 6 = Sunday
    const monday = new Date(now.getTime() - dow * 86400000);
    if (name === 'week') return { from: localISO(monday), to };                  // this Monday → today
    return { from: localISO(new Date(monday.getTime() - 7 * 86400000)),          // previous Mon → Sun
             to: localISO(new Date(monday.getTime() - 86400000)) };
  }
  if (name === 'month') return { from: mfirst(now.getFullYear(), now.getMonth()), to };
  if (name === 'lastmonth') {
    const y = now.getFullYear(), m = now.getMonth();
    const ly = m === 0 ? y - 1 : y, lm = m === 0 ? 11 : m - 1;
    const last = new Date(ly, lm + 1, 0).getDate();                             // last day of that month
    return { from: mfirst(ly, lm), to: `${ly}-${String(lm + 1).padStart(2, '0')}-${String(last).padStart(2, '0')}` };
  }
  const days = { '7': 6, '30': 29, '90': 89 }[name] || 0;
  return { from: localISO(new Date(now.getTime() - days * 86400000)), to };
}

  document.querySelectorAll('#presets button').forEach((b) => b.classList.toggle('active', b.dataset.preset === name));
}

  document.getElementById('from').value = newRange.from || '';
  document.getElementById('to').value = newRange.to || '';

}

  const bar = fams.map(([f, c]) => `<div style="width:${(c / total * 100).toFixed(2)}%;background:${MODEL_COLORS[f] || '#888'}"></div>`).join('');
  const legend = fams.map(([f, c]) => `<span class="item"><span class="dot" style="background:${MODEL_COLORS[f] || '#888'}"></span>${esc(f)} — ${fmtUSD(c)} (${(c / total * 100).toFixed(0)}%)</span>`).join('');
  return `<div class="split">${bar}</div><div class="legend">${legend}</div>`;
}
// DOM order for stacked segments: last child sits at the bottom of the bar, so

const FAM_ORDER = ['haiku', 'sonnet', 'opus'];
function dailyChart(daily) {
  if (!daily.length) return '<div class="loading">No dated activity in range.</div>';
  const max = Math.max(...daily.map((d) => d.cost), 0.0001);
  const bars = daily.map((d) => {
    const cbf = d.costByFamily || { opus: d.cost };
    const present = FAM_ORDER.filter((f) => cbf[f] > 0);
    const segs = present.map((f) =>
      `<div class="seg" style="height:${(cbf[f] / max * 142).toFixed(2)}px;background:${MODEL_COLORS[f]}"></div>`).join('');
    const bd = Object.entries(cbf).filter(([, c]) => c > 0).sort((a, b) => b[1] - a[1])

    const inner = segs || `<div class="bar" style="height:${(d.cost / max * 142).toFixed(1)}px"></div>`;
    return `<div class="bar-wrap" title="${esc(d.date)} — ${fmtUSD(d.cost)} · ${d.messages} msgs${bd ? '\n' + bd : ''}">${inner}</div>`;
  }).join('');
  return `<div class="chart">${bars}</div>

// Weekday × hour spend heatmap. Display rows Mon→Sun; cost drives accent opacity.
// Activity panel — range-adaptive. Uses module state (activityData / activityRange

function shortDate(day) {
  return new Date(day + 'T00:00:00Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
}
function rangeSpanDays() {
  if (!activityRange || !activityRange.from || !activityRange.to) return null; // all time / unbounded
  const a = Date.parse(activityRange.from + 'T00:00:00Z'), b = Date.parse(activityRange.to + 'T00:00:00Z');
  if (isNaN(a) || isNaN(b)) return null;
  return Math.round((b - a) / 86400000) + 1;
}
function rangeDates() {
  const out = [];
  if (!activityRange || !activityRange.from || !activityRange.to) return out;
  let t = Date.parse(activityRange.from + 'T00:00:00Z');
  const end = Date.parse(activityRange.to + 'T00:00:00Z');
  while (t <= end) { out.push(new Date(t).toISOString().slice(0, 10)); t += 86400000; }
  return out;
}

// A date × hour heatmap — one row per actual date in the range (the 2–7 day view).

  const bar = ct > 0 ? segs.map(([, v, col]) => `<div style="width:${(v / ct * 100).toFixed(2)}%;background:${col}"></div>`).join('') : '';
  const legend = ct > 0 ? segs.map(([l, v, col]) => `<span class="item"><span class="dot" style="background:${col}"></span>${l} — ${fmtUSD(v)} (${(v / ct * 100).toFixed(0)}%)</span>`).join('') : '';

// Tool reliability: error rate, recovery spend, and a per-tool error breakdown.

function deltaChip(change, pct, mode) {
  if (change == null) return '';
  const eps = 0.005;
  const dir = change > eps ? 'up' : (change < -eps ? 'down' : 'flat');
  const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '▬');
  let color = 'var(--muted)';
  if (mode === 'cost') color = dir === 'up' ? 'var(--warn)' : (dir === 'down' ? 'var(--good)' : 'var(--muted)');
  if (pct == null) return `<span style="color:var(--muted)">new</span>`;
  const pctStr = (pct >= 0 ? '+' : '') + (pct * 100).toFixed(0) + '%';
  return `<span style="color:${color}">${arrow} ${pctStr}</span>`;
}
function trendCell(p) {
  if (p.costPrev == null) return '—';
  return deltaChip(p.cost - p.costPrev, p.costPct, 'cost');
}
function deltaHint(delta, kind, fallback) {
  if (!delta) return fallback;
  if (kind === 'cost') return `${deltaChip(delta.costChange, delta.costPct, 'cost')} vs prev ${delta.days}d`;
  return `${deltaChip(delta.promptsChange, delta.promptsPct, 'neutral')} vs prev ${delta.days}d`;
}
function toolChips(topTools) {

    ? topTools.slice(0, 24).map((t) => `<span class="chip">${esc(t.name)}<b>${fmtNum(t.count)}</b></span>`).join('')

function spendSection(title, items, hint) {

    <div class="hint" style="margin-top:8px">${esc(hint)}</div></div>`;
}

function selectProject(id) {

  syncURL();
  renderProjectList();
  refresh();

function openSession(projectId, sessionId) {

  syncURL();
  refresh();

// silent=true is the live-refresh path: don't blank to "Loading…", keep the
// user's table sort + scroll position, and leave the view intact on error.
async function refresh(silent) {
  const main = document.getElementById('main');
  const scroll = main ? main.scrollTop : 0;
  document.getElementById('empty').style.display = 'none';
  const detail = document.getElementById('detail');
  detail.style.display = 'block';
  if (!silent) detail.innerHTML = '<div class="loading" style="margin-top:24px">Loading…</div>';
  try {
    if (view.type === 'overview') {
      const res = await fetch('/api/overview' + qs());
      if (!res.ok) throw new Error('overview');
      renderOverview(await res.json(), { preserve: silent });
    } else if (view.type === 'project') {
      const res = await fetch('/api/project/' + encodeURIComponent(view.projectId) + qs());
      if (!res.ok) throw new Error('project');
      renderDetail(await res.json(), { preserve: silent });
    } else if (view.type === 'session') {
      const res = await fetch('/api/session/' + encodeURIComponent(view.projectId) + '/' + encodeURIComponent(view.sessionId));
      if (!res.ok) throw new Error('session');
      renderSession(await res.json());
    }
    if (silent && main) main.scrollTop = scroll;
  } catch (e) {
    if (!silent) {
      detail.innerHTML = '<div class="loading" style="margin-top:24px">Failed to load (' + esc(e.message) +
        '). <button type="button" id="retry-btn" style="margin-left:8px;padding:5px 13px;background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:8px;font:inherit;cursor:pointer">Retry</button></div>';
      const rb = document.getElementById('retry-btn');
      if (rb) rb.addEventListener('click', () => refresh());
    }
  }
}

// --- Live monitoring --------------------------------------------------------
// Polls the current view on an interval so the dashboard tracks an in-progress
// session's spend. Parsing is mtime-cached server-side, so ticks are cheap.
const LIVE = { on: false, ms: 20000, fetchTimer: null, tickTimer: null, lastAt: null, busy: false };
function todaySpend() {
  if (!lastDaily) return null;
  const today = new Date().toISOString().slice(0, 10); // UTC, matches the day-keys
  const e = lastDaily.find((d) => d.date === today);
  return e ? e.cost : 0;
}
function agoStr(t) {
  const s = Math.max(0, Math.round((Date.now() - t) / 1000));
  return s < 60 ? s + 's ago' : Math.round(s / 60) + 'm ago';
}
function renderLiveStatus() {
  const el = document.getElementById('live-status');
  if (!el) return;
  if (!LIVE.on) { el.textContent = ''; return; }
  const parts = [];
  const ts = todaySpend();
  if (ts != null) parts.push('today ' + fmtUSD(ts));
  if (LIVE.busy) parts.push('updating…');
  else if (LIVE.lastAt) parts.push('updated ' + agoStr(LIVE.lastAt));
  el.textContent = parts.join('  ·  ');
}
async function liveTick() {
  if (LIVE.busy) return;
  LIVE.busy = true; renderLiveStatus();
  try { await loadProjects(); await refresh(true); LIVE.lastAt = Date.now(); }
  catch (e) { /* keep the last good view; try again next tick */ }
  finally { LIVE.busy = false; renderLiveStatus(); }
}
function stopLiveTimers() {
  if (LIVE.fetchTimer) clearInterval(LIVE.fetchTimer);
  if (LIVE.tickTimer) clearInterval(LIVE.tickTimer);
  LIVE.fetchTimer = LIVE.tickTimer = null;
}
function startLiveTimers() {
  stopLiveTimers();
  LIVE.fetchTimer = setInterval(liveTick, LIVE.ms);
  LIVE.tickTimer = setInterval(renderLiveStatus, 1000); // keep the "Ns ago" fresh
}
function setLive(on) {
  LIVE.on = on;
  try { localStorage.setItem('ledger.live', on ? '1' : '0'); } catch (e) {}
  const btn = document.getElementById('live-toggle');
  if (btn) btn.classList.toggle('on', on);
  if (on) { startLiveTimers(); liveTick(); } else { stopLiveTimers(); renderLiveStatus(); }
}

    <div class="section"><h3>Spend by model</h3>${modelSplit(t.costByFamily, t.cost)}${modelVersions(d.topModels)}</div>
    ${entrypointSection(d.topEntrypoints)}
    <div class="section"><h3>Daily spend — all projects</h3>${dayStatsRow(d.daily)}${dailyChart(d.daily)}</div>
    ${activitySection()}
    <div class="section"><h3>Top tools — all projects</h3><div class="tools">${toolChips(d.topTools)}</div></div>
    ${spendSection('Spend by skill', d.topSkills, 'Cost of turns each skill drove (only turns Claude Code tagged with a skill).')}
    ${spendSection('Spend by MCP server', d.topMcp, 'Cost of turns attributed to each MCP server.')}
    ${worklogSection(d.worklog)}
    <div class="section">
      <h3>Projects by spend (${d.projects.length}) <a class="csvlink" href="/api/overview.csv${qs()}">⤓ CSV</a></h3>
      <table>
        <thead><tr id="lead-head">
          ${LEAD_COLS.map((c) => { if (c.trend && !d.delta) return ''; const s = c.key !== null; return `<th class="${s ? 'sortable ' : ''}${c.num ? 'num' : ''}" scope="col"${s ? ` data-key="${c.key}" tabindex="0" aria-sort="none"` : ''}>${c.label}${s ? '<span class="arrow" aria-hidden="true"></span>' : ''}</th>`; }).join('')}
        </tr></thead>
        <tbody id="lead-body"></tbody>
      </table>
    </div>`;
  leadData = d.projects;
  leadMax = maxCost;
  leadHasPrev = !!d.delta;
  if (!opts.preserve) leadSort = { key: 'cost', dir: 'desc' };
  document.querySelectorAll('#lead-head th').forEach((th) => {
    const go = () => onLeadHeader(th.dataset.key);
    th.addEventListener('click', go);
    th.addEventListener('keydown', (e) => { if ((e.key === 'Enter' || e.key === ' ') && th.dataset.key) { e.preventDefault(); go(); } });
  });
  renderLeaderboard();
  renderActivity();
}

function renderDetail(d, opts) {
  opts = opts || {};
  lastDaily = d.daily;
  activityData = d.hourly;
  activityRange = { from: range.from, to: range.to };
  if (!opts.preserve) activityDay = null;
  const t = d.totals;
  const totalTokens = t.tokens.input + t.tokens.output + t.tokens.cacheRead + t.tokens.cacheWrite;
  document.getElementById('detail').innerHTML = `
    <div class="header">
      <h2>${esc(d.name)}</h2>
      <div class="path">${esc(d.cwd)}${d.gitBranch ? `<span class="branch">⎇ ${esc(d.gitBranch)}</span>` : ''}</div>
    </div>
    ${insightsSection(d.insights)}
    ${outputSection(d.output, t.cost)}
    <div class="cards">
      <div class="card"><div class="label">Total cost</div><div class="value cost">${fmtUSD(t.cost)}</div><div class="hint">${deltaHint(d.delta, 'cost', fmtRange(t.start, t.end))}</div></div>
      <div class="card"><div class="label">Sessions</div><div class="value">${fmtNum(t.sessions)}</div><div class="hint">of ${fmtNum(t.sessionsTotal)} total</div></div>
      <div class="card"><div class="label">Prompts</div><div class="value">${fmtNum(t.userPrompts)}</div><div class="hint">${deltaHint(d.delta, 'prompts', 'human turns')}</div></div>
      <div class="card"><div class="label">Cost / prompt</div><div class="value cost">${fmtUSD(d.perSession.prompt)}</div><div class="hint">${fmtUSD(d.perSession.cost)} / session</div></div>
      <div class="card"><div class="label">Tool calls</div><div class="value">${fmtNum(t.toolUses)}</div><div class="hint">${fmtNum(t.assistantMessages)} assistant msgs</div></div>
      <div class="card"><div class="label">Total tokens</div><div class="value">${fmtTokens(totalTokens)}</div><div class="hint">${fmtTokens(t.tokens.output)} output</div></div>
      <div class="card"><div class="label">Cache savings</div><div class="value good">${fmtUSD(d.cacheSavings)}</div><div class="hint">vs. uncached reads</div></div>
      <div class="card"><div class="label">Cache reads</div><div class="value">${fmtTokens(t.tokens.cacheRead)}</div><div class="hint">${fmtTokens(t.tokens.cacheWrite)} written</div></div>
    </div>
    ${efficiencySection(d.efficiency)}
    ${reliabilitySection(d.reliability, t.cost)}
    ${timeSection(d.time)}
    <div class="section"><h3>Spend by model</h3>${modelSplit(t.costByFamily, t.cost)}${modelVersions(d.topModels)}</div>
    ${entrypointSection(d.topEntrypoints)}
    <div class="section"><h3>Daily spend</h3>${dayStatsRow(d.daily)}${dailyChart(d.daily)}</div>
    ${activitySection()}
    <div class="section"><h3>Top tools</h3><div class="tools">${toolChips(d.topTools)}</div></div>
    ${spendSection('Spend by skill', d.topSkills, 'Cost of turns each skill drove (only turns Claude Code tagged with a skill).')}
    ${spendSection('Spend by MCP server', d.topMcp, 'Cost of turns attributed to each MCP server.')}
    <div class="section">
      <h3>Sessions (${d.sessions.length}) — click a row for details <a class="csvlink" href="/api/project/${encodeURIComponent(d.id)}.csv${qs()}">⤓ CSV</a></h3>
      <table>
        <thead><tr id="sess-head">
          ${SESS_COLS.map((c) => `<th class="sortable${c.num ? ' num' : ''}" scope="col" tabindex="0" aria-sort="none" data-key="${c.key}">${c.label}<span class="arrow" aria-hidden="true"></span></th>`).join('')}
        </tr></thead>
        <tbody id="sess-body"></tbody>
      </table>
    </div>`;
  sessData = d.sessions;
  if (!opts.preserve) sessSort = { key: 'end', dir: 'desc' };
  document.querySelectorAll('#sess-head th').forEach((th) => {
    const go = () => onSessHeader(th.dataset.key);
    th.addEventListener('click', go);
    th.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); } });
  });
  renderSessions();
  renderActivity();

function renderSession(d) {
  lastDaily = null;
  const t = d.totals;
  const totalTokens = t.tokens.input + t.tokens.output + t.tokens.cacheRead + t.tokens.cacheWrite;
  const proj = PROJECTS.find((p) => p.id === d.projectId);
  const projName = proj ? proj.name : 'project';
  const maxStep = Math.max(...d.timeline.map((x) => x.cost), 0.0001);
  const timeline = d.timeline.length
    ? `<div class="chart">${d.timeline.map((x) => `<div class="bar-wrap" title="${fmtDateTime(x.ts)} — ${fmtUSD(x.cost)} (cum ${fmtUSD(x.cumCost)})"><div class="bar" style="height:${(x.cost / maxStep * 142).toFixed(1)}px"></div></div>`).join('')}</div>
       <div class="chart-x"><span>start</span><span>peak ${fmtUSD(maxStep)}/turn</span><span>end</span></div>`
    : '<div class="loading">No priced turns.</div>';
  document.getElementById('detail').innerHTML = `
    <button type="button" class="backlink" id="sess-back">← ${esc(projName)}</button>
    <div class="header">
      <h2>${esc(d.title)}</h2>
      <div class="path">${esc(d.cwd)}${d.gitBranch ? `<span class="branch">⎇ ${esc(d.gitBranch)}</span>` : ''}</div>
    </div>
    ${d.parseErrors > 0 ? `<div class="section" style="border-color:var(--warn)"><div class="hint" style="color:var(--warn)">⚠ ${fmtNum(d.parseErrors)} malformed line${d.parseErrors === 1 ? '' : 's'} in this transcript were skipped — totals here may undercount.</div></div>` : ''}
    ${outputSection(d.output, t.cost)}
    <div class="cards">
      <div class="card"><div class="label">Cost</div><div class="value cost">${fmtUSD(t.cost)}</div><div class="hint">${fmtDate(d.start)}</div></div>
      <div class="card"><div class="label">Prompts</div><div class="value">${fmtNum(t.userPrompts)}</div><div class="hint">human turns</div></div>
      <div class="card"><div class="label">Tool calls</div><div class="value">${fmtNum(t.toolUses)}</div></div>
      <div class="card"><div class="label">Total tokens</div><div class="value">${fmtTokens(totalTokens)}</div><div class="hint">${fmtTokens(t.tokens.output)} output</div></div>
      <div class="card"><div class="label">Duration</div><div class="value">${fmtDuration(d.start, d.end)}</div><div class="hint">wall clock</div></div>
      <div class="card"><div class="label">Cache savings</div><div class="value good">${fmtUSD(d.cacheSavings)}</div><div class="hint">${fmtTokens(t.tokens.cacheRead)} read</div></div>
    </div>
    <div class="section"><h3>Spend by model</h3>${modelSplit(t.costByFamily, t.cost)}${modelVersions(d.topModels)}</div>
    ${entrypointSection(d.topEntrypoints)}
    <div class="section"><h3>Cost per turn</h3>${timeline}</div>
    <div class="section"><h3>Top tools</h3><div class="tools">${toolChips(d.topTools)}</div></div>
    ${reliabilitySection(d.reliability, t.cost)}
    ${timeSection(d.time)}
    <div class="section">
      <h3>Prompts (${d.prompts.length})</h3>
      ${d.prompts.length ? d.prompts.map((p, i) => `<div class="prompt"><div class="when">#${i + 1} · ${fmtDateTime(p.ts)}</div><div class="text">${esc(p.text)}</div></div>`).join('') : '<div class="loading">No user prompts recorded.</div>'}
    </div>`;
  document.getElementById('sess-back').addEventListener('click', () => selectProject(d.projectId));
}

// --- Init -------------------------------------------------------------------
async function init() {
  document.querySelectorAll('#presets button').forEach((b) =>
    b.addEventListener('click', () => applyRange(presetRange(b.dataset.preset), b.dataset.preset))
  );
  ['from', 'to'].forEach((id) =>
    document.getElementById(id).addEventListener('change', () => {
      const from = document.getElementById('from').value || null;
      const to = document.getElementById('to').value || null;
      applyRange({ from, to }, null);
    })
  );
  document.getElementById('live-toggle').addEventListener('click', () => setLive(!LIVE.on));
  document.addEventListener('visibilitychange', () => {
    if (!LIVE.on) return;
    if (document.hidden) stopLiveTimers();      // pause polling in a background tab
    else { startLiveTimers(); liveTick(); }     // catch up on return
  });

  // Restore the view + range from the URL (deep link / reload), and keep the
  // back/forward buttons working.
  applyURLState();
  window.addEventListener('popstate', () => {
    applyURLState();
    loadProjects().then(() => { if (PROJECTS.length) refresh(); });
  });

  const data = await loadProjects();
  if (data.bounds) {
    ['from', 'to'].forEach((id) => {
      const el = document.getElementById(id);
      if (data.bounds.min) el.min = data.bounds.min;
      if (data.bounds.max) el.max = data.bounds.max;
    });
  }
  if (PROJECTS.length) refresh();

  let wantLive = false;
  try { wantLive = localStorage.getItem('ledger.live') === '1'; } catch (e) {}
  if (wantLive && PROJECTS.length) setLive(true);
}

init().catch((e) => {
  document.getElementById('proj-list').innerHTML = '<div class="loading" style="padding:12px">Error: ' + esc(e.message) + '</div>';
});
</script>
